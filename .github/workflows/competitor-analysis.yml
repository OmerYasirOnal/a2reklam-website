name: Rakip Analiz (Aylık)

# Her ayın 1. günü 11:00 UTC (14:00 Istanbul) rakip analiz çalıştırır.
# Gemini ile yeni rakip keşfi + sitemap/meta analizi + GitHub Issue raporu.

on:
  schedule:
    - cron: '0 11 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Discover competitors (Gemini + Google grounding)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/competitor-discovery.mjs

      - name: Analyze competitors (sitemap + meta)
        run: node scripts/competitor-analysis.mjs

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/data/competitors.json scripts/data/competitor-report-*.md || true
          if git diff --staged --quiet; then
            echo "Değişiklik yok"
            exit 0
          fi
          MONTH=$(date +%Y-%m)
          git commit -m "chore: rakip analiz raporu ${MONTH} [skip ci]"
          git push

      - name: Create issue with report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reports = fs.readdirSync('scripts/data')
              .filter(f => f.startsWith('competitor-report-') && f.endsWith('.md'))
              .sort()
              .reverse();
            if (reports.length === 0) {
              console.log('Rapor dosyası yok');
              return;
            }
            const reportFile = path.join('scripts/data', reports[0]);
            const report = fs.readFileSync(reportFile, 'utf8');
            const month = reports[0].replace('competitor-report-', '').replace('.md', '');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Rakip Analiz Raporu — ${month}`,
              body: report.substring(0, 60000), // GitHub 65K karakter limit
              labels: ['competitor-analysis', 'automated', 'report'],
            });
