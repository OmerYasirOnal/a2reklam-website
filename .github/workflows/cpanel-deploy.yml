name: cPanel Auto-Deploy (DEPRECATED — Cloudflare'e taşındı)

# DEPRECATED: Site Cloudflare Pages'e taşındı (bkz. docs/CLOUDFLARE_MIGRATION.md).
# Otomatik push tetikleyicisi KALDIRILDI; aksi halde main'e merge GuzelHosting'e
# eski PHP'siz kodu deploy edip canlı formu bozardı. Yalnızca manuel (rollback) için durur.
# DNS Cloudflare'e geçtikten ve her şey doğrulandıktan sonra bu dosya tamamen silinebilir.

on:
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Create dist.zip
        run: |
          cd dist
          zip -r -q ../dist.zip .
          cd ..
          ls -lh dist.zip

      - name: Upload to cPanel via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          curl -s -T dist.zip "ftp://${FTP_HOST}/dist.zip" \
            --user "${FTP_USER}:${FTP_PASS}" \
            --ftp-create-dirs

      - name: Extract on server
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          RESULT=$(curl --resolve a2reklam.com:443:89.252.183.211 -s -m120 "https://a2reklam.com/api/deploy-extract.php?secret=${DEPLOY_SECRET}")
          echo "$RESULT"
          echo "$RESULT" | grep -q '"ok":true' || (echo "::error::Extract başarısız" && exit 1)

      - name: Purge cache
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          curl --resolve a2reklam.com:443:89.252.183.211 -s -m30 "https://a2reklam.com/api/cache-purge.php?secret=${DEPLOY_SECRET}" || true
          curl --resolve a2reklam.com:443:89.252.183.211 -s -m60 "https://a2reklam.com/api/force-refresh.php?secret=${DEPLOY_SECRET}" || true
          curl --resolve a2reklam.com:443:89.252.183.211 -s -m30 "https://a2reklam.com/api/cleanup-stale.php?secret=${DEPLOY_SECRET}" || true

      - name: Submit to IndexNow (Bing/Yandex)
        run: node scripts/submit-indexnow.mjs || true
